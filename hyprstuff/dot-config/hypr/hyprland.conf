$theme = gruvbox

# █▀ █▀█ █ █ █▀█ █▀▀ █▀▀ █▀ #
# ▄█ █▄█ █▄█ █▀▄ █▄▄ ██▄ ▄█ #

source = $HOME/.config/hypr/themes/$theme.conf
source = $HOME/.config/hypr/keybinds.conf
source = $HOME/.config/hypr/rules.conf


# █▀▀ ▀▄▀ █▀▀ █▀▀ █▀ #
# ██▄ █ █ ██▄ █▄▄ ▄█ #

exec-once = waybar
exec-once = /usr/lib/xfce-polkit/xfce-polkit
exec-once = wl-paste --watch cliphist store
exec-once = thunar --daemon
exec-once = udiskie
exec-once = hypridle
exec-once = swww-daemon

# █▀▀ █▄ █ █ █ █▀ #
# ██▄ █ ▀█ ▀▄▀ ▄█ #

env = XCURSOR_THEME,cur_mcmojave
env = XCURSOR_SIZE,24

env = HYPRCURSOR_THEME = cur_mcmojave
env = HYPRCURSOR_SIZE = 24

env = QT_QPA_PLATFORMTHEME,qt5ct
env = GTK_THEME,Adwaita:dark


# █▀▄▀█ █▀█ █▄ █ █ ▀█▀ █▀█ █▀█ █▀ #
# █ ▀ █ █▄█ █ ▀█ █  █  █▄█ █▀▄ ▄█ #

monitor = eDP-1, 1920x1080@60, 0x0, 1.25 # Laptop screen
monitor = HDMI-A-2, 2560x1080@100, auto-left, 1
monitor = , preferred, auto, 1, mirror, eDP-1 # Any other connected monitor will mirror it

monitor = eDP-1, addreserved, -16, 0, 0, 0
monitor = HDMI-A-2, addreserved, -16, 0, 0, 0

workspace = name:1, monitor:HDMI-A-2
workspace = name:2, monitor:eDP-1
workspace = name:3, monitor:HDMI-A-2
workspace = name:4, monitor:eDP-1
workspace = name:5, monitor:HDMI-A-2
workspace = name:6, monitor:eDP-1
workspace = name:7, monitor:HDMI-A-2
workspace = name:8, monitor:eDP-1
workspace = name:9, monitor:HDMI-A-2
workspace = name:10, monitor:eDP-1

exec-once = hyprctl dispatch workspace 1


# █ █▄ █ █▀█ █ █ ▀█▀ #
# █ █ ▀█ █▀▀ █▄█  █  #

input {
    kb_layout = us
    kb_variant = altgr-intl # Spanish characters using AltGr
    repeat_delay = 240
    repeat_rate = 24

    sensitivity = 0
    follow_mouse = 1

    kb_options = caps:escape

    touchpad {
        natural_scroll = true
        scroll_factor = 0.75
    }
}

gestures {
    workspace_swipe = true
}

device {
    name = logitech-g-pro--1
    sensitivity = 0.5
    accel_profile = flat
}

device {
    name = logitech-usb-receiver-mouse
    sensitivity = 0.5
    accel_profile = flat
}


# █▀▀ █▀▀ █▄ █ █▀▀ █▀█ ▄▀█ █   #
# █▄█ ██▄ █ ▀█ ██▄ █▀▄ █▀█ █▄▄ #

general {
    gaps_in = 8
    gaps_out = 16
    border_size = 2
    layout = dwindle
    resize_on_border = false
    allow_tearing = true

    snap {
        enabled = true
    }
    
    col.active_border = $border_active
    col.inactive_border = $border_inactive
}

group {
    col.border_active = $border_active
    col.border_inactive = $border_inactive

    groupbar {
        col.active = $border_active
        col.inactive = $border_inactive
        height = 8
        render_titles = false
    }
}


# █   ▄▀█ █▄█ █▀█ █ █ ▀█▀ #
# █▄▄ █▀█  █  █▄█ █▄█  █  #

dwindle {
    force_split = 2
    smart_resizing = false
    permanent_direction_override = true
    preserve_split = true   # Would allow toggling splits
}


# █▀▄▀█ █ █▀ █▀▀ #
# █ ▀ █ █ ▄█ █▄▄ #

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    background_color = $background
    middle_click_paste = false
}

ecosystem {
    no_update_news = true
}


# █▀▄ █▀▀ █▀▀ █▀█ █▀█ ▄▀█ ▀█▀ █ █▀█ █▄ █ █▀ #
# █▄▀ ██▄ █▄▄ █▄█ █▀▄ █▀█  █  █ █▄█ █ ▀█ ▄█ #

decoration {
    rounding = 0    # 4 usually
    dim_special = 0.25

    blur {
        enabled = false
        size = 4
        xray = true
        brightness = 1
        popups = true
    }
    
    shadow {
        enabled = true
        range = 16
        render_power = 2
        offset = 0, 2
        scale = 1
        color = rgba(00000040)
    }
}


# ▄▀█ █▄ █ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄ █ █▀ #
# █▀█ █ ▀█ █ █ ▀ █ █▀█  █  █ █▄█ █ ▀█ ▄█ #

animations {
    enabled = yes

    bezier = decel, 0, 0.5, 0, 1
    bezier = accel, 0.5, 0, 1, 0
    
    animation = windowsIn, 1, 2.4, decel, popin 50%
    animation = windowsOut, 1, 2.4, accel, popin 50%
    animation = fadeIn, 1, 2.8, decel
    animation = fadeOut, 1, 2.8, accel
    animation = layersIn, 1, 2.4, decel, slidefadevert
    animation = layersOut, 1, 2.4, accel, slidefadevert
    animation = fadeLayersIn, 1, 2.8, decel
    animation = fadeLayersOut, 1, 2.8, accel
    animation = workspaces, 1, 4.8, decel, slidefade 20%
    animation = specialWorkspaceIn, 1, 2.8, decel, slidefadevert 20%
    animation = specialWorkspaceOut, 1, 2.8, accel, slidefadevert 20%
    animation = border, 1, 8, default
}
